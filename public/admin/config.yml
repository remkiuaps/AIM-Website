                  - { name: ctaLink, label: CTA Link, widget: string }
                  - { name: image, label: Image, widget: image }

          # ── ABOUT SECTION ──
          - name: aboutSection
            label: About Section
            widget: object
            fields:
              - { name: companyName, label: Company Name, widget: string }
              - { name: description, label: Description, widget: text }
              - name: features

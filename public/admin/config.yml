                widget: list
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: image, label: Image, widget: image }

          # ── SUPERVISION ──
          - name: supervision
            label: Supervision
            widget: object
            fields:
              - { name: heroTitle, label: Hero Title, widget: string }
              - { name: heroSubtitle, label: Hero Subtitle, widget: string }
              - { name: heroImage, label: Hero Image, widget: image }
              - { name: heroVideo, label: Hero Video (path), widget: string }
              - { name: description, label: Description, widget: text }
              - name: sections
                label: Sections
                widget: list
                fields:
                  - { name: title, label: Title, widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: image, label: Image, widget: image }

          # ── ABOUT PAGE ──
          - name: aboutPage
            label: About Page
            widget: object
            fields:
              - { name: title, label: Title, widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: story, label: Story, widget: text }
              - { name: mission, label: Mission, widget: text }
              - name: values

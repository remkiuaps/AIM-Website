                fields:
                  - { name: slug, label: Slug, widget: string }
                  - { name: icon, label: Icon, widget: image }
                  - { name: title, label: Title, widget: string }
                  - { name: shortDescription, label: Short Description, widget: text }
                  - { name: fullDescription, label: Full Description, widget: text }
                  - { name: features, label: Features, widget: list, field: { name: feature, label: Feature, widget: string } }
                  - { name: image, label: Image, widget: image }

          # ── PROJECTS ──
          - name: projects
